name: Publish React Example App to GitHub Pages

on:
  push:
    branches: [main, react-demo-app]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            examples/react/package-lock.json

      - name: Install library dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Install example dependencies
        run: npm ci
        working-directory: examples/react

      - name: Build example app
        run: npm run build -- --base=/privy-near-connect/
        working-directory: examples/react
        env:
          VITE_PRIVY_APP_ID: ${{ vars.VITE_PRIVY_APP_ID }}
          VITE_PRIVY_APP_CLIENT_ID: ${{ vars.VITE_PRIVY_APP_CLIENT_ID }}

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: examples/react/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
